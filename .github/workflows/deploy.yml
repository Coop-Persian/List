# نام این workflow
name: Deploy to GitHub Pages

# رویدادهایی که باعث اجرای این workflow می‌شوند
on:
  # وقتی تغییری در branch اصلی (main) ایجاد شود
  push:
    branches: [ "main" ]
  # اجازه اجرای دستی از تب Actions در گیت‌هاب
  workflow_dispatch:

# سطح دسترسی‌های مورد نیاز
permissions:
  contents: read
  pages: write
  id-token: write

# اجازه اجرای همزمان فقط یک workflow
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # کار ساخت و استقرار
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: دریافت کد از مخزن
        uses: actions/checkout@v4
      
      - name: راه‌اندازی Pages
        uses: actions/configure-pages@v5
      
      - name: آپلود فایل‌ها
        uses: actions/upload-pages-artifact@v3
        with:
          # مسیر پوشه‌ای که قرار است منتشر شود (ریشه پروژه)
          path: '.'
      
      - name: استقرار در GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
