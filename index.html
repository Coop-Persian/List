<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دیتابیس مودهای هم‌افزاری</title>
  <!-- اضافه کردن TailwindCSS برای استایل‌بندی سریع -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* یک استایل ساده برای کارت‌ها */
    .game-card {
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .game-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px -5px rgba(0, 255, 255, 0.3);
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen">

  <!-- هدر سایت -->
  <header class="bg-gray-800/80 backdrop-blur-sm border-b border-gray-700 sticky top-0 z-50">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-cyan-400">🎮 پایگاه داده مود</h1>
      <div>
        <input type="text" id="searchInput" placeholder="جستجوی بازی..." class="bg-gray-700 text-sm rounded-full px-4 py-2 w-40 md:w-64 focus:outline-none focus:ring-2 focus:ring-cyan-500">
      </div>
    </div>
  </header>

  <!-- بخش اصلی که کارت‌های بازی در آن نمایش داده می‌شود -->
  <main class="container mx-auto px-4 py-8">
    <div id="gameGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <!-- کارت‌ها توسط جاوااسکریپت ساخته می‌شوند -->
    </div>
  </main>

  <script>
    // --- اینجا کد جاوااسکریپت ما قرار می‌گیرد ---

    // ۱. تابع برای دریافت اطلاعات از فایل JSON
    async function loadGames() {
      try {
        const response = await fetch('data/games.json');
        if (!response.ok) {
          throw new Error('فایل JSON پیدا نشد!');
        }
        const games = await response.json();
        return games;
      } catch (error) {
        console.error('خطا در دریافت اطلاعات:', error);
        return [];
      }
    }

    // ۲. تابع برای ساخت کارت‌های بازی و نمایش در صفحه
    function renderGames(games) {
      const grid = document.getElementById('gameGrid');
      if (!grid) return;

      if (!games || games.length === 0) {
        grid.innerHTML = '<p class="text-gray-400 col-span-full text-center">هیچ بازی ای برای نمایش وجود ندارد.</p>';
        return;
      }

      // ساخت HTML برای هر بازی
      let html = '';
      games.forEach(game => {
        html += `
          <div class="game-card bg-gray-800/50 backdrop-blur-sm rounded-xl overflow-hidden shadow-lg">
            <img src="${game.cover || 'https://via.placeholder.com/300x150'}" 
                 alt="${game.name}" 
                 class="w-full h-40 object-cover"
                 loading="lazy">
            <div class="p-4">
              <h3 class="text-lg font-semibold text-cyan-300 mb-1">${game.name}</h3>
              <p class="text-sm text-gray-400 mb-2">مود: ${game.modName || 'ندارد'}</p>
              <div class="flex flex-wrap gap-1">
                ${game.tags ? game.tags.map(tag => `<span class="text-xs bg-gray-700 px-2 py-0.5 rounded-full">#${tag}</span>`).join('') : ''}
              </div>
              <a href="${game.downloadLink || '#'}" target="_blank" 
                 class="mt-3 inline-block bg-cyan-600 hover:bg-cyan-700 text-white text-sm font-medium py-1.5 px-4 rounded-full transition">
                دانلود مود
              </a>
            </div>
          </div>
        `;
      });

      grid.innerHTML = html;
    }

    // ۳. اجرای اصلی: وقتی صفحه بارگذاری شد، اطلاعات را بگیر و نمایش بده
    document.addEventListener('DOMContentLoaded', async () => {
      const allGames = await loadGames();
      renderGames(allGames);

      // ۴. اضافه کردن قابلیت جستجوی زنده
      const searchInput = document.getElementById('searchInput');
      if (searchInput) {
        searchInput.addEventListener('input', (event) => {
          const query = event.target.value.trim().toLowerCase();
          if (!query) {
            renderGames(allGames);
            return;
          }
          const filteredGames = allGames.filter(game => 
            game.name.toLowerCase().includes(query) || 
            (game.modName && game.modName.toLowerCase().includes(query))
          );
          renderGames(filteredGames);
        });
      }
    });

  </script>
</body>
</html>
